<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulan Novia Boba - Banner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="banner-container">
        <header class="logo-section">
            <div class="logo-icon">🧋</div>
            <h1>Ulan Novia <span>boba</span></h1>
        </header>

        <div class="price-badge">
            <p>Mulai dari</p>
            <h3>Rp 5.000</h3>
        </div>

        <div class="product-images">
            <div class="drink drink-left"></div>
            <div class="drink drink-center"></div>
            <div class="drink drink-right"></div>
        </div>

        <div class="content-section">
            <div class="title-container">
                <span class="badge-minuman">MINUMAN</span>
                <h2 class="main-title">BOBA <br> SEGAR</h2>
            </div>

            <div class="toppings">
                <p class="topping-label">Pilihan topping:</p>
                <ul class="topping-list">
                    <li>Boba kenyal</li>
                    <li>Jeli</li>
                    <li>Puding</li>
                    <li>Keju parut</li>
                </ul>
            </div>

            <div class="footer-cta">
                <a href="https://wa.me/628893620711" class="btn-pesan">Pesan Sekarang!</a>
                <div class="wa-number">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WA">
                    +62 889-3620-711
                </div>
            </div>
        </div>
    </div>

</body>
</html>
